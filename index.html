<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Cadet Quiz</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="flex items-center justify-center min-h-screen p-4 text-white">

    <!-- Main Game Container -->
    <div id="game-container" class="bg-gray-900 bg-opacity-80 backdrop-blur-sm border border-indigo-700 rounded-3xl shadow-[0_0_50px_rgba(76,29,149,0.5)] p-8 w-full max-w-2xl space-y-8">
        <h1 id="game-title" class="text-4xl font-bold text-center mb-6 text-indigo-400">Mission Control</h1>

        <!-- Header: AI Assistant and Score -->
        <div class="flex justify-between items-center text-lg font-medium text-gray-400 border-b border-gray-700 pb-4">
            <span id="ai-assistant" class="flex items-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-400" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2A10 10 0 0 0 2 12a10 10 0 0 0 10 10 10 10 0 0 0 10-10A10 10 0 0 0 12 2zm-2 15h4v-2h-4v2zm0-4h4v-2h-4v2zm4-4h-4V7h4v2z"/>
                </svg>
                <span>AI Assistant</span>
            </span>
            <span id="score-info">Score: 0</span>
        </div>

        <p id="round-info" class="text-gray-400 font-medium text-center">Mission 1</p>

        <!-- Main Content Area -->
        <div id="game-content" class="space-y-6">
            <p id="question" class="text-2xl font-semibold text-center text-gray-200 leading-relaxed">
                Welcome, Space Cadet! Are you ready for your first mission?
            </p>

            <!-- Question and Answer Area -->
            <div class="relative flex items-center justify-center py-8">
                <!-- Circular Timer -->
                <svg class="w-24 h-24 absolute" viewBox="0 0 100 100">
                    <circle class="text-gray-700 stroke-current" stroke-width="8" cx="50" cy="50" r="45" fill="transparent"></circle>
                    <circle id="timer-ring" class="text-indigo-500 stroke-current" stroke-width="8" cx="50" cy="50" r="45" fill="transparent" stroke-linecap="round" transform="rotate(-90 50 50)"></circle>
                </svg>
                <span id="countdown-text" class="text-3xl font-bold text-indigo-400 absolute">30</span>
            </div>

            <div id="answers" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <!-- Status Message Box (hidden by default) -->
        <div id="message-box" class="message-box text-center text-2xl font-bold p-4 rounded-xl hidden"></div>
        
        <!-- Loading Spinner -->
        <div id="loading-spinner" class="flex justify-center hidden"><div class="spinner"></div></div>

        <!-- Action Button -->
        <button id="action-btn" class="w-full py-4 mt-6 text-xl font-bold rounded-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 transition-all duration-300">Begin Mission</button>
    </div>

    <!-- Audio elements -->
    <audio id="sfx-correct" src="https://assets.mixkit.co/sfx/preview/mixkit-sci-fi-confirmation-2415.mp3"></audio>
    <audio id="sfx-wrong" src="https://assets.mixkit.co/sfx/preview/mixkit-sci-fi-reject-2417.mp3"></audio>
    <audio id="sfx-countdown" src="https://assets.mixkit.co/sfx/preview/mixkit-sci-fi-beep-1249.mp3"></audio>
    <audio id="sfx-victory" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-complete-2055.mp3"></audio>

    <!-- JavaScript -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js"></script>
</body>
</html>
